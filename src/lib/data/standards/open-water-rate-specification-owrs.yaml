metrics:
  transferability:
    value: true
    rationale: OWRS is a general structure that supports many different types of water rates (e.g. tiered versus budget-based) with no regionally specific attributes
  stakeholder_participation:
    value: true
    rationale: The CaDC is made up of stakeholders from California utilities sector
  consensus_government:
    value: true
    rationale: Contributions can be made to the OWRS and other CaDC project on their GitHub page
  machine_readable:
    value: true
    rationale: YAML key-value pair structure
  human_readable:
    value: true
    rationale: YAML structure is even easier to parse than regular markup languages or JSON
  requires_realtime:
    value: true
    rationale: effective date is a required element for a bill, and municipalities will release the rate bills at regular intervals
  metadata:
    value: true
    rationale: Metadata includes fields such as agency or utility name, date, and bill frequency
  extensions:
    value: true
    indicators: Extensions only permissible in the metadata, where agency information is located.  Rate structure is inclusive but non-extensible
