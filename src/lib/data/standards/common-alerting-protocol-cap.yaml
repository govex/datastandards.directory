metrics:
  transferability:
    value: true
    rationale: CAP was designed to be used internationally, and does not require data specific to any jurisdiction
  stakeholder_participation:
    value: true
    rationale: The technical working group for CAP consists of members of the emergency management and response community
  consensus_government:
    value: false
    rationale: No method for contribution
  machine_readable:
    value: true
    rationale: XML schema
  human_readable:
    value: true
    rationale: Data values are not coded and entries contain plaintext descriptions
  requires_realtime:
    value: true
    rationale: Feeds are headed by an http request timestamp
  metadata:
    value: true
    rationale: Header contains metadata such as alerting.net namespace and Atom syndication format
  extensions:
    value: true
    indicators: Extensibility was one of the main requirements when designing the standard. Countries have created their own variations of CAP, such as CAP Canadian Profile, which addresses Canadian needs such as bilingualism and Canadian geocoding
