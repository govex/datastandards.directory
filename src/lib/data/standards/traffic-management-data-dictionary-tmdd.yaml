metrics:
  transferability:
    value: true
    rationale: The vocabulary included in the TMDD is very thorough and broad. There are few required fields in the schema and it is applicable to many fields of traffic management. The standard allows extensions.
  stakeholder_participation:
    value: true
    rationale: Contributors consisted of members of the IT sector, the engineering sector, and public agencies such as CalTrans and the City of LA
  consensus_government:
    value: false
  machine_readable:
    value: true
    rationale: XML schema
  human_readable:
    value: false
    rationale: Element names are somewhat cryptic
  requires_realtime:
    value: false
  metadata:
    value: true
    rationale: Provided metadata XML schema must be imported in header
  extensions:
    value: true
    indicators: As long as additional features do not conflict with (i.e. substitute) TMDD features, extensions are permitted, but must be defined in a namespace separate from the copyrighted TMDD namespace
