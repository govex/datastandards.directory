metrics:
  transferability:
    value: true
    rationale: Although the intended users of this standard are in the UK, the standard can specify activity in any country, and funding from any source or in any currency. The standard uses ISO codes for countries, currencies, and dates. Some of the geography codes are UK-specific.
  stakeholder_participation:
    value: true
    rationale: The employees and board of directors at 360Giving are all associated with either the Open Data sector or the charity and government funding sector
  consensus_government:
    value: true
    rationale: Standard and documentation is maintained on GitHub, with many contributors
  machine_readable:
    value: true
    rationale: JSON or CSV format is specified
  human_readable:
    value: true
    rationale: Any coded variables in the schema are accompanied by a plaintext description (e.g. ISO codes for currencies)
  requires_realtime:
    value: true
    rationale: Grants and donations are one-time events, which are documented individually. Repeat transactions between parties are stored in an organized manner in the GrantNav tool
  metadata:
    value: true
    rationale: The standard uses several standard codes in addition to ISOs, such as an organisation identifier that is specified on their website
  extensions:
    value: false
    indicators: 360 Giving is encouraging users to follow a template for the schema, implying that all users should have identical fields
