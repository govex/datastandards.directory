name: General Transportation
slug: general-transportation
category: Transportation
subcategory:
  - Ontology
description: Vocabulario para la representación de medios de transporte is an ontology for describing transportation infrastructure as well as political entities such as villages and other administrative areas
stage_in_development: Draft
license: Creative Commons Attribution License 4.0 International
version: '0.1'
updated: '2014-05-08'
recorded: '2017-08-29'
verified: true
publisher: The Ontology Engineering Group
publisher_reputation: The Ontology Engineering Group is based at the Computer Science School at Universidad Politécnica de Madrid. It is widely recognised in Europe in the areas of Ontology Engineering, Semantic Infrastructure, Linked Data, and Data Integration. Oscar Corcho has collaborated with members of Spanish city councils and other Spanish organizations to draft vocabularies for linked open data
links:
  website: https://en.wikipedia.org/wiki/NaPTAN
  documentation: http://vocab.linkeddata.es/datosabiertos/def/urbanismo-infraestructuras/Transporte.html
  contact: mailto:ocorcho@fi.upm.es
open: true
metrics:
  transferability:
    value: false
    rationale: This vocabulary is intended to be used by municipalities across Spain, but could be transferable. Data class and property names that are not inherited from NAPTAN (English) are in Spanish
  stakeholder_participation:
    value: true
    rationale: The contributors to this vocabulary includes Madrid transportation authority officials
  consensus_government:
    value: false
    rationale: No way for the public and interested parties to contribute to the development of vocabularies
  machine_readable:
    value: true
    rationale: An OWL schema is provided
  human_readable:
    value: true
    rationale: An HTML documentation page makes the ontology schema human-readable
  requires_realtime:
    value: false
  metadata:
    value: true
    rationale: Namespaces used are declared in section 1.1 of the documentation. This vocabulary makes extensive use of NAPTAN's transportation vocabulary
  extensions:
    value: false
