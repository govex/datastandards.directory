    value: false
  stakeholder_participation:
    value: false
  consensus_government:
    value: false
    rationale: The standard hosts an issue tracker on GitHub
  machine_readable:
    value: true
    rationale: XML - based import/export format for election devices that handles the data. Schema is organized by elements and their attributes of the election process. Sub-elements refer to elements that are nested within other elements. Schema is in XSD format
  human_readable:
    value: true
    rationale: The standard uses object identifiers and links elements within the electoral system. Standard also includes a glossary to ensure compliance and uniformity during implementation
