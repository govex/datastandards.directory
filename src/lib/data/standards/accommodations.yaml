name: Accommodations
slug: accommodations
category: Services
subcategory:
  - Ontology
  - Commercial
description: Vocabulario para la representación de alojamientos is an ontology for representing lodging information in Spain (hotels, hostels, etc). This vocabulary should be used in conjunction with VPDA - Spanish Postal Addresses and VPDA - Spanish Administrative Land Units
stage_in_development: Draft
license: Creative Commons Attribution License 4.0 International
version: '0.1'
updated: '2015-03-06'
recorded: '2017-08-30'
verified: true
publisher: The Ontology Engineering Group
publisher_reputation: The Ontology Engineering Group is based at the Computer Science School at Universidad Politécnica de Madrid. It is widely recognised in Europe in the areas of Ontology Engineering, Semantic Infrastructure, Linked Data, and Data Integration. Oscar Corcho has collaborated with members of Spanish city councils and other Spanish organizations to draft vocabularies for linked open data
links:
  documentation: http://vocab.linkeddata.es/datosabiertos/def/turismo/alojamiento-content/0.1/
  example: http://www.zaragoza.es/ciudad/turismo/es/organiza-viaje/detalle_Alojamiento?id=1068&op=t
  contact: mailto:ocorcho@fi.upm.es
open: true
metrics:
  transferability:
    value: false
    rationale: This vocabulary is intended to be used by municipalities across Spain, but could be transferable. Data class and property names are in Spanish
  stakeholder_participation:
    value: true
    rationale: The contributors to this vocabulary includes a member of Zaragoza city council as well as a member of Localidata, a Spanish start-up specializing in open data
  consensus_government:
    value: false
    rationale: No way for the public and interested parties to contribute to the development of vocabularies
  machine_readable:
    value: true
    rationale: An OWL schema is provided
  human_readable:
    value: true
    rationale: An HTML documentation page makes the ontology schema human-readable
  requires_realtime:
    value: false
  metadata:
    value: true
    rationale: Namespaces used are declared in section 1.1 of the documentation. This vocabulary extends schema.org, GeoNames, FuncacionCTIC, and VPDA - Tourist Sites ontologies
  extensions:
    value: false
