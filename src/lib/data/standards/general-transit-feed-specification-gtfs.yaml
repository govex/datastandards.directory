name: General Transit Feed Specification (GTFS)
slug: general-transit-feed-specification-gtfs
category: Transportation
subcategory:
  - Transit Schedules
description: Standard format for handling public transportation and geographic data. Developed by Google and the TriMet public transportation agency
stage_in_development: Completed
license: Creative Commons Attribution 3.0 License
updated: '2016-07-26'
recorded: '2017-07-12'
verified: true
publisher: Google
publisher_reputation: Partnership among the private and public sectors. Municipal transit data is combined with Google's technological input to create the specification
consumers: By 2013, the standard format had been applied to hundreds of transit systems' data around the world
apps: 'There are many. Please see following list for non-google apps built from the GTFS schema: https://code.google.com/p/googletransitdatafeed/wiki/OtherGTFSTools'
links:
  website: https://developers.google.com/transit/gtfs/
  documentation: https://developers.google.com/transit/gtfs/reference/
  example: https://developers.google.com/transit/gtfs/examples/
  contact: https://developers.google.com/transit/gtfs/#getting-help
open: true
metrics:
  transferability:
    value: true
    rationale: Zip file containing CSV files with information about routes, stops, and agencies (saved as .txt)
  stakeholder_participation:
    value: true
    rationale: GTFS is a collaboration between private and public sectors. Google and public transit agencies as partners - some government bodies initially hesitant to hand over the data to Google
  consensus_government:
    value: false
    rationale: No opportunity to be included in decisions made about the standard's evolution. Technical committee not open to the public
  machine_readable:
    value: true
    rationale: CSVs saved as text files stored in a zip file.
  human_readable:
    value: true
    rationale: Standard aims to be easily readable and use description, universally understood vocabulary
  requires_realtime:
    value: true
    rationale: GTFS-RT handles real time transit data in a feed over HTTP
  metadata:
    value: false
  extensions:
    value: true
    indicators: 'GTFS - Real Time: protocol buffers (as an alternative to XML) hosted over HTTP and gtfs realtime.proto produces source code to read and write the structured data and then retrieves it to and from a data stream using a variety of programming languages'
