open: true
metrics:
  transferability:
    value: true
    rationale: GeoReport has been adopted in various jurisdictions across the US. The OPEN311 does not specify the codes, making it possible for the API to be applied to whatever civic services specifically offered in that city
  stakeholder_participation:
    value: true
    rationale: Collaboration between developers, government, and nonprofit organizations
  consensus_government:
    value: true
    rationale: The public can contribute to the standard's 'issue tracker' on GitHub and edit the open311 Wiki
  machine_readable:
    value: true
    rationale: Bulk datasets are downloadable in CSV or another machine-readable format
  human_readable:
    value: true
    rationale: Open311 follows the REST schema and uses human readable identifiers to label the data
  requires_realtime:
    value: true
    rationale: Full datasets usually published annually, with a current year dataset also available
  metadata:
    value: false
  extensions:
    value: false
    indicators: It is recommended to adhere strictly to the specification
